<!DOCTYPE html>
<html>
<head>
    <title>Test Activities API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Test Activities API</h1>
    <button onclick="testAPI()">Load Activities</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const phone = "+2348055586485";
            const url = `http://127.0.0.1:8000/api/v1/activities?phone=${encodeURIComponent(phone)}`;
            document.getElementById('result').innerText = 'Fetching: ' + url + '\n\n';
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('result').innerText += JSON.stringify(data, null, 2);
            } catch(err) {
                document.getElementById('result').innerText += 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
