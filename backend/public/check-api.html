<!DOCTYPE html>
<html>
<head>
    <title>KIN API Check</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>KIN API Check</h1>
    <button onclick="checkAPI()">Check API</button>
    <pre id="result"></pre>

    <script>
        async function checkAPI() {
            const url = 'http://127.0.0.1:8000/api/v1/dashboard?phone=%2B2348055586485';
            document.getElementById('result').innerText = 'Testing: ' + url + '\n\n';
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                document.getElementById('result').innerText += 'Response status: ' + response.status + '\n\n';
                document.getElementById('result').innerText += text;
            } catch(err) {
                document.getElementById('result').innerText += 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
