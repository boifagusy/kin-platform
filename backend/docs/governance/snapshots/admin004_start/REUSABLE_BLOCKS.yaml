version: 1.0

reusable_blocks:

  authentication:

    status: active

    controllers:
      - AuthController

    actions:
      - ConfirmPhoneAction
      - CreatePinAction
      - LoginPinAction
      - SaveUserDetailsAction
      - SaveTrustedContactAction
      - CompleteOnboardingAction

    models:
      - User

    routes:
      - /auth/login
      - /auth/confirm-phone
      - /auth/create-pin
      - /auth/login-pin

  dashboard:

    status: active

    controllers:
      - DashboardController

    actions:
      - GetDashboardAction

    services:
      - DashboardSnapshotService
      - SafetyScoreService

    purpose:
      User dashboard snapshots

  checkin_system:

    status: active

    controllers:
      - CheckInController
      - CheckInSettingsController

    services:
      - CheckInService

    models:
      - CheckIn
      - CheckinSetting

    jobs:
      - ProcessMissedCheckInJob
      - SendCheckInReminderJob

  sos_system:

    status: active

    controllers:
      - SosController

    models:
      - SosEvent

    events:
      - SOSTriggered

    listeners:
      - QueueSosAlert

    jobs:
      - SendSosAlertJob

    purpose:
      SOS emergency activation

  duress_system:

    status: active

    controllers:
      - DuressPinController

    models:
      - User

    purpose:
      Silent emergency escalation

  escalation_system:

    status: active

    models:
      - EmergencyEscalation
      - AlertNote

    services:
      - SafetyMonitorService

    purpose:
      Emergency response workflow

  trusted_contacts:

    status: active

    controllers:
      - TrustedContactController

    models:
      - TrustedContact

  activity_tracking:

    status: active

    models:
      - ActivityLog

    listeners:
      - CreateActivityLog
      - UpdateSafetyScore
      - RefreshDashboardCache

  notification_system:

    status: active

    services:
      - NotificationService

    jobs:
      - SendCheckInReminderJob
      - SendSosAlertJob

  password_reset:

    status: active

    controllers:
      - PasswordResetController

    services:
      - PasswordResetService

    models:
      - PasswordReset

  location_system:

    status: active

    controllers:
      - LocationController

    services:
      - EmergencyPermissionService

  admin_dashboard:

    status: active

    controllers:
      - DashboardController
      - SafetyMonitorController

    services:
      - SafetyMonitorService

    views:
      - admin/dashboard/*
      - admin/alerts/*

  user_management:

    status: active

    controllers:
      - UserManagementController

    services:
      - UserManagementService
      - UserActionService

    models:
      - User
      - UserStatus

  audit_system:

    status: active

    controllers:
      - AuditController

    services:
      - AuditService

    models:
      - AdminLog

  settings_system:

    status: active

    controllers:
      - SystemSettingsController

    services:
      - SystemSettingsService

    models:
      - SystemSetting

architecture_rules:

  reuse_order:
    - reuse
    - extend
    - refactor
    - create

  forbidden:

    - duplicate_service
    - duplicate_controller
    - duplicate_model
    - duplicate_route

  before_create:

    - search_reusable_blocks
    - review_existing_code
    - justify_new_architecture

