version: 1.0

dependencies:

  ADMIN-004:

    name: Dashboard Real Data

    controllers:
      - DashboardController
      - SafetyMonitorController

    services:
      - DashboardSnapshotService
      - SafetyMonitorService

    models:
      - User
      - SosEvent
      - EmergencyEscalation
      - ActivityLog
      - CheckIn

    views:
      - resources/views/admin/dashboard/index.blade.php

    routes:
      - admin.dashboard
      - admin.safety.metrics
      - admin.safety.trend

  ADMIN-013A:

    name: Alert Operations

    controllers:
      - SafetyMonitorController

    services:
      - SafetyMonitorService

    models:
      - EmergencyEscalation
      - AlertNote
      - SosEvent

    views:
      - resources/views/admin/alerts/index.blade.php
      - resources/views/admin/alerts/show.blade.php

  ADMIN-016A:

    name: User Management

    controllers:
      - UserManagementController

    services:
      - UserManagementService
      - UserActionService

    models:
      - User
      - UserStatus

  SOS-SYSTEM:

    controllers:
      - SosController

    services:
      - NotificationService

    models:
      - SosEvent
      - EmergencyEscalation

    events:
      - SOSTriggered

    listeners:
      - QueueSosAlert

    jobs:
      - SendSosAlertJob

