<!DOCTYPE html>
<html>
<head>
  <title>Clear Queue</title>
</head>
<body>
  <h1>📊 Clear Queue</h1>
  <button id="clearBtn">Clear Queue</button>
  <pre id="output">Ready</pre>

  <script type="importmap">
  {
    "imports": {
      "./src/services/LocationQueue.js": "./src/services/LocationQueue.js"
    }
  }
  </script>

  <script type="module">
    import { LocationQueue } from './src/services/LocationQueue.js';
    const output = document.getElementById('output');

    document.getElementById('clearBtn').onclick = async () => {
      output.textContent = '⏳ Clearing...';
      try {
        const queue = new LocationQueue();
        const size = await queue.size();
        output.textContent = `📊 Size before: ${size}\n`;
        await queue.clear();
        const newSize = await queue.size();
        output.textContent += `✅ Cleared!\n📊 Size after: ${newSize}`;
      } catch (e) {
        output.textContent = `❌ Error: ${e.message}`;
      }
    };
  </script>
</body>
</html>
