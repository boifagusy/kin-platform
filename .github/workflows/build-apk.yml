name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build
        npx cap sync android
        
        # Add missing strings.xml if needed
        cd android/app/src/main/res
        mkdir -p values
        cd values
        if [ ! -f strings.xml ]; then
          echo '<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">Kin</string>
    <string name="default_notification_channel_id">kin_notifications</string>
</resources>' > strings.xml
        else
          if ! grep -q "default_notification_channel_id" strings.xml; then
            sed -i '/<\/resources>/i \    <string name="default_notification_channel_id">kin_notifications</string>' strings.xml
          fi
        fi
        cd ../../../../
        
        # Build with Kotlin support
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kin-app-debug
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
