name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Web
      working-directory: ./frontend
      run: |
        npm install --legacy-peer-deps
        npm run build
        
    - name: Sync Capacitor
      working-directory: ./frontend
      run: npx cap sync android
        
    - name: Create strings.xml
      run: |
        mkdir -p frontend/android/app/src/main/res/values
        cat > frontend/android/app/src/main/res/values/strings.xml << 'STRINGS'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Kin</string>
            <string name="default_notification_channel_id">kin_notifications</string>
        </resources>
        STRINGS
        
    - name: Build APK
      working-directory: ./frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kin-app-debug
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
