name: Build KIN Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build Web
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Restore Custom Icons
        working-directory: ./frontend
        run: |
          echo "🔧 Restoring custom icons..."
          # Copy your custom icons from the repo to the Android resources
          # The icons are at: android/app/src/main/res/mipmap-*/
          # They should be copied to the same location (they're already there after checkout)
          # But we need to make sure they're not overwritten by sync
          # So we copy them back from the git-tracked version
          cp -r ../android/app/src/main/res/mipmap-* ./android/app/src/main/res/ 2>/dev/null || true
          # Remove adaptive icons
          rm -rf ./android/app/src/main/res/mipmap-anydpi-v26/
          echo "✅ Custom icons restored"

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
