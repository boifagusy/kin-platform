# Engineering OS — Authoritative Engine Registry
# This is the single source of truth. Health checks read from here.
# Architecture Freeze active. New engines require ADR.

version: 3.3
status: STABLE
freeze_date: 2026-07-12

engines:
  - id: governance
    version: 3.3.0
    layer: context
    status: stable
    command: ai guard
    depends_on: [gate, state]
    
  - id: gate
    version: 3.2.1
    layer: context
    status: stable
    command: ai gate
    depends_on: [state]
    
  - id: project
    version: 3.3.0
    layer: context
    status: stable
    command: ai project
    depends_on: [gate, governance]
    
  - id: discovery
    version: 3.3.0
    layer: knowledge
    status: stable
    command: ai discovery
    depends_on: [state]
    
  - id: intelligence
    version: 3.3.0
    layer: knowledge
    status: stable
    command: ai intelligence
    depends_on: [discovery, gate]
    
  - id: investigation
    version: 3.3.0
    layer: knowledge
    status: stable
    command: ai investigate
    depends_on: [discovery]
    
  - id: contract
    version: 3.3.0
    layer: verification
    status: stable
    command: ai contract
    depends_on: [discovery]
    
  - id: validate
    version: 3.2.0
    layer: verification
    status: stable
    command: ai validate
    depends_on: [state]
    
  - id: certification
    version: 3.3.0
    layer: verification
    status: stable
    command: ai certify
    depends_on: [gate, contract]
    
  - id: brick
    version: 3.2.0
    layer: delivery
    status: stable
    command: ai brick
    depends_on: [gate, contract]
    
  - id: workflow
    version: 3.3.0
    layer: delivery
    status: stable
    command: ai workflow
    depends_on: [gate, governance]
    
  - id: restore
    version: 3.3.0
    layer: utilities
    status: stable
    command: ai restore
    depends_on: [state]
    
  - id: clipboard
    version: 3.3.0
    layer: utilities
    status: stable
    command: ai copy
    depends_on: []
    
  - id: help
    version: 3.3.0
    layer: utilities
    status: stable
    command: ai help
    depends_on: []

layers:
  context:     [governance, gate, project]
  knowledge:   [discovery, intelligence, investigation]
  verification: [contract, validate, certification]
  delivery:    [brick, workflow]
  utilities:   [restore, clipboard, help]
