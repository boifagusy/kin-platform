<!DOCTYPE html>
<html>
<head>
    <title>KIN React Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
        .pass { color: #22c55e; }
        .fail { color: #ef4444; }
        .info { color: #3b82f6; }
        .box { background: #2d2d44; padding: 16px; border-radius: 8px; margin: 8px 0; }
    </style>
</head>
<body>
    <h1>🔍 KIN React Debug</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `box ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        log('🚀 Debug started', 'info');

        // Test 1: Check if main.jsx loads
        log('📦 Testing main.jsx load...', 'info');
        fetch('/src/main.jsx')
            .then(r => r.text())
            .then(code => {
                log('✅ main.jsx loaded (' + code.length + ' bytes)', 'pass');
                // Check if it has ReactDOM.createRoot
                if (code.includes('ReactDOM.createRoot')) {
                    log('✅ ReactDOM.createRoot found', 'pass');
                } else {
                    log('❌ ReactDOM.createRoot NOT found', 'fail');
                }
            })
            .catch(() => log('❌ main.jsx failed to load', 'fail'));

        // Test 2: Check if App.jsx loads
        log('📦 Testing App.jsx load...', 'info');
        fetch('/src/App.jsx')
            .then(r => r.text())
            .then(code => {
                log('✅ App.jsx loaded (' + code.length + ' bytes)', 'pass');
                if (code.includes('export default')) {
                    log('✅ export default found', 'pass');
                }
            })
            .catch(() => log('❌ App.jsx failed to load', 'fail'));

        // Test 3: Check if router.jsx loads
        log('📦 Testing router.jsx load...', 'info');
        fetch('/src/router.jsx')
            .then(r => r.text())
            .then(code => {
                log('✅ router.jsx loaded (' + code.length + ' bytes)', 'pass');
                if (code.includes('createBrowserRouter')) {
                    log('✅ createBrowserRouter found', 'pass');
                }
            })
            .catch(() => log('❌ router.jsx failed to load', 'fail'));

        // Test 4: Try to dynamically import main.jsx
        log('📦 Testing dynamic import...', 'info');
        import('/src/main.jsx')
            .then(() => log('✅ Dynamic import main.jsx SUCCESS', 'pass'))
            .catch((e) => log('❌ Dynamic import main.jsx FAILED: ' + e.message, 'fail'));

        log('✅ All tests complete', 'info');
    </script>
</body>
</html>
