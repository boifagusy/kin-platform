<!DOCTYPE html>
<html>
<head>
    <title>KIN Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
        .pass { color: #22c55e; }
        .fail { color: #ef4444; }
        .info { color: #3b82f6; }
        .box { background: #2d2d44; padding: 16px; border-radius: 8px; margin: 8px 0; }
    </style>
</head>
<body>
    <h1>🔍 KIN Debug Page</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `box ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        log('🚀 Debug page loaded', 'info');

        // Test 1: Check if React loads
        log('📦 Checking React...', 'info');

        // Try to load React
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/react@18/umd/react.production.min.js';
        script.onload = () => log('✅ React loaded from CDN', 'pass');
        script.onerror = () => log('❌ React CDN failed', 'fail');
        document.head.appendChild(script);

        // Test 2: Check Vite server
        log('📡 Checking Vite server...', 'info');
        fetch('/')
            .then(() => log('✅ Vite server responding', 'pass'))
            .catch(() => log('❌ Vite server not responding', 'fail'));

        // Test 3: Check main.jsx
        log('📄 Checking main.jsx...', 'info');
        fetch('/src/main.jsx')
            .then(r => r.status === 200 ? log('✅ main.jsx found', 'pass') : log('❌ main.jsx not found', 'fail'))
            .catch(() => log('❌ main.jsx fetch failed', 'fail'));

        // Test 4: Check App.jsx
        log('📄 Checking App.jsx...', 'info');
        fetch('/src/App.jsx')
            .then(r => r.status === 200 ? log('✅ App.jsx found', 'pass') : log('❌ App.jsx not found', 'fail'))
            .catch(() => log('❌ App.jsx fetch failed', 'fail'));

        // Test 5: Check router.jsx
        log('📄 Checking router.jsx...', 'info');
        fetch('/src/router.jsx')
            .then(r => r.status === 200 ? log('✅ router.jsx found', 'pass') : log('❌ router.jsx not found', 'fail'))
            .catch(() => log('❌ router.jsx fetch failed', 'fail'));

        // Test 6: Check index.html
        log('📄 Checking index.html...', 'info');
        fetch('/')
            .then(r => r.status === 200 ? log('✅ index.html found', 'pass') : log('❌ index.html not found', 'fail'))
            .catch(() => log('❌ index.html fetch failed', 'fail'));

        log('✅ All tests complete', 'info');
    </script>
</body>
</html>
