<!DOCTYPE html>
<html>
<head>
    <title>Disguised Check-in Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: #f8f9fa;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #1A5632; font-size: 24px; }
        p { color: #666; font-size: 14px; }
        button {
            padding: 16px 40px;
            background: #1A5632;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .success { background: #d4edda; color: #155724; }
        .info { background: #e2f0fb; color: #004085; }
        .danger { background: #f8d7da; color: #721c24; }
        .reset-btn {
            padding: 8px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🕵️ Disguised Check-in</h1>
        <p>Tap the button 5 times quickly</p>

        <button id="mainBtn">📋 Check In (0/5)</button>

        <div id="message" class="message info" style="display:none;">Ready</div>

        <button class="reset-btn" onclick="resetTest()">🔄 Reset</button>

        <div class="footer">💡 Tap 5 times within 3 seconds to trigger Silent SOS</div>
    </div>

    <script>
        let tapCount = 0;
        let cooldown = 0;
        let timer = null;
        let cooldownTimer = null;

        const btn = document.getElementById('mainBtn');
        const msgDiv = document.getElementById('message');

        function showMessage(text, type = 'info') {
            msgDiv.style.display = 'block';
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
        }

        function hideMessage() {
            msgDiv.style.display = 'none';
        }

        function updateButton() {
            if (cooldown > 0) {
                btn.textContent = `⏳ Cooldown ${cooldown}s`;
                btn.disabled = true;
            } else {
                btn.textContent = `📋 Check In (${tapCount}/5)`;
                btn.disabled = false;
            }
        }

        function handleTap() {
            // Check cooldown
            if (cooldown > 0) {
                showMessage(`⏳ Cooldown: ${cooldown}s`, 'info');
                return;
            }

            const newCount = tapCount + 1;
            tapCount = newCount;
            showMessage(`👆 ${newCount}/5`, 'info');

            // Reset timer if tap count is 1
            if (newCount === 1) {
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => {
                    tapCount = 0;
                    updateButton();
                    hideMessage();
                }, 3000);
            }

            // Check if threshold reached
            if (newCount >= 5) {
                showMessage('🔇 SILENT SOS TRIGGERED!', 'success');
                tapCount = 0;
                cooldown = 10;
                updateButton();

                // Start cooldown countdown
                if (cooldownTimer) clearInterval(cooldownTimer);
                cooldownTimer = setInterval(() => {
                    cooldown--;
                    updateButton();
                    if (cooldown <= 0) {
                        clearInterval(cooldownTimer);
                        cooldownTimer = null;
                        showMessage('✅ Ready', 'info');
                        setTimeout(hideMessage, 2000);
                    }
                }, 1000);
            }

            updateButton();
        }

        function resetTest() {
            tapCount = 0;
            cooldown = 0;
            if (timer) clearTimeout(timer);
            if (cooldownTimer) clearInterval(cooldownTimer);
            timer = null;
            cooldownTimer = null;
            updateButton();
            hideMessage();
        }

        // Add event listener
        btn.addEventListener('click', handleTap);
    </script>
</body>
</html>
